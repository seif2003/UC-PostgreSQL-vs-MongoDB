services:
  postgres:
    image: postgres:16
    container_name: facturia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: facturia
      POSTGRES_PASSWORD: facturia
      POSTGRES_DB: facturia
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facturia -d facturia"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: facturia-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: facturia
      MONGO_INITDB_ROOT_PASSWORD: facturia
      MONGO_INITDB_DATABASE: facturia
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok", "-u", "facturia", "-p", "facturia", "--authenticationDatabase", "admin"]
      interval: 10s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:latest
    container_name: facturia-n8n
    restart: unless-stopped
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      GENERIC_TIMEZONE: Europe/Paris
      N8N_SECURE_COOKIE: "false"
      N8N_RUNNERS_ENABLED: "true"
    ports:
      - "5678:5678"
    volumes:
      - n8ndata:/home/node/.n8n
      - ./n8n:/workflows:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - app-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: facturia-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@facturia.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - app-net

  mongo-express:
    image: mongo-express:latest
    container_name: facturia-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: facturia
      ME_CONFIG_MONGODB_ADMINPASSWORD: facturia
      ME_CONFIG_MONGODB_URL: mongodb://facturia:facturia@mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-net

volumes:
  pgdata:
  mongodata:
  n8ndata:

networks:
  app-net:
    driver: bridge
